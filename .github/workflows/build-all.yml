name: Build All Platforms

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyyaml
    
    - name: Install project dependencies
      run: |
        pip install fastapi uvicorn python-multipart numpy opencv-python
    
    - name: Build Linux executable
      run: |
        pyinstaller --onefile --name "MAGI-Pipeline-Linux" --add-data "src/ui/static:src/ui/static" src/ui/desktop_launcher.py
    
    - name: Create distribution directory
      run: |
        mkdir -p dist-release
        cp dist/MAGI-Pipeline-Linux dist-release/
        chmod +x dist-release/MAGI-Pipeline-Linux
    
    - name: Upload all executables
      uses: actions/upload-artifact@v3
      with:
        name: MAGI-Pipeline-All-Platforms
        path: dist-release/
        retention-days: 90
    
    - name: Create Release Summary
      run: |
        echo "## 🎬 MAGI Pipeline Build Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Download Instructions" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to the **Actions** tab in this repository" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on the latest **Build All Platforms** workflow run" >> $GITHUB_STEP_SUMMARY
        echo "3. Scroll down to the **Artifacts** section" >> $GITHUB_STEP_SUMMARY
        echo "4. Click on **MAGI-Pipeline-All-Platforms** to download" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 What You'll Get" >> $GITHUB_STEP_SUMMARY
        echo "- **MAGI-Pipeline-Linux** - Linux executable binary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🚀 How to Use" >> $GITHUB_STEP_SUMMARY
        echo "1. Download and extract the archive" >> $GITHUB_STEP_SUMMARY
        echo "2. Make the executable: \`chmod +x MAGI-Pipeline-Linux\`" >> $GITHUB_STEP_SUMMARY
        echo "3. Run: \`./MAGI-Pipeline-Linux\`" >> $GITHUB_STEP_SUMMARY
        echo "4. The web UI will open automatically in your browser" >> $GITHUB_STEP_SUMMARY
        echo "5. Access MAGI Viewer at http://localhost:8000/viewer/viewer" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✨ Features" >> $GITHUB_STEP_SUMMARY
        echo "- Video conversion to MAGI format (120fps 4K 3D)" >> $GITHUB_STEP_SUMMARY
        echo "- MAGI Viewer with test patterns and 3D display modes" >> $GITHUB_STEP_SUMMARY
        echo "- Frame synchronization (VSync, G-Sync, FreeSync)" >> $GITHUB_STEP_SUMMARY
        echo "- Real-time game capture and camera input" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Platform-Specific Builds" >> $GITHUB_STEP_SUMMARY
        echo "For platform-specific builds, see:" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Windows Executable** workflow" >> $GITHUB_STEP_SUMMARY
        echo "- **Build macOS Executable** workflow" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Linux Executable** workflow" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
    
    - name: Create Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist-release/
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}