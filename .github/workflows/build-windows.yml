name: Build Windows Executable

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyyaml
    
    - name: Install project dependencies
      run: |
        pip install fastapi uvicorn python-multipart numpy opencv-python
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name "MAGI-Pipeline" --add-data "src/ui/static;src/ui/static" src/ui/desktop_launcher.py
    
    - name: Create distribution directory
      run: |
        mkdir dist-release
        copy dist\MAGI-Pipeline.exe dist-release\MAGI-Pipeline-Windows.exe
    
    - name: Upload executable
      uses: actions/upload-artifact@v3
      with:
        name: MAGI-Pipeline-Windows-Executable
        path: dist-release/MAGI-Pipeline-Windows.exe
        retention-days: 90
    
    - name: Create Release Summary
      run: |
        echo "## 🎬 MAGI Pipeline Windows Build Complete" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "### 📥 Download Instructions" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "1. Go to the **Actions** tab in this repository" >> $env:GITHUB_STEP_SUMMARY
        echo "2. Click on the latest **Build Windows Executable** workflow run" >> $env:GITHUB_STEP_SUMMARY
        echo "3. Scroll down to the **Artifacts** section" >> $env:GITHUB_STEP_SUMMARY
        echo "4. Click on **MAGI-Pipeline-Windows-Executable** to download" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "### 📦 What You'll Get" >> $env:GITHUB_STEP_SUMMARY
        echo "- **MAGI-Pipeline-Windows.exe** - Standalone Windows executable" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "### 🚀 How to Use" >> $env:GITHUB_STEP_SUMMARY
        echo "1. Download the executable" >> $env:GITHUB_STEP_SUMMARY
        echo "2. Double-click to run" >> $env:GITHUB_STEP_SUMMARY
        echo "3. The web UI will open automatically in your browser" >> $env:GITHUB_STEP_SUMMARY
        echo "4. Access MAGI Viewer at http://localhost:8000/viewer/viewer" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY
        echo "### ✨ Features" >> $env:GITHUB_STEP_SUMMARY
        echo "- Video conversion to MAGI format (120fps 4K 3D)" >> $env:GITHUB_STEP_SUMMARY
        echo "- MAGI Viewer with test patterns and 3D display modes" >> $env:GITHUB_STEP_SUMMARY
        echo "- Frame synchronization (VSync, G-Sync, FreeSync)" >> $env:GITHUB_STEP_SUMMARY
        echo "- Real-time game capture and camera input" >> $env:GITHUB_STEP_SUMMARY
        echo "" >> $env:GITHUB_STEP_SUMMARY