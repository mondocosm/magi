name: Build macOS Executable

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        architecture: 'x64'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka pyinstaller ordered-set zstandard pyyaml
    
    - name: Install project dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Build with Nuitka
      run: |
        python build_desktop.py --config build_configs/macos.yaml --nuitka
    
    - name: Create macOS package
      run: |
        if command -v pkgbuild &> /dev/null; then
          pkgbuild --root dist --identifier com.magi.pipeline --version 1.0.0 MAGI-Pipeline.pkg
        else
          echo "pkgbuild not found. Skipping package creation."
        fi
    
    - name: Upload executable
      uses: actions/upload-artifact@v3
      with:
        name: MAGI-Pipeline-macOS
        path: |
          dist/*.app
          dist/*.dmg
          MAGI-Pipeline.pkg
        retention-days: 30
    
    - name: Create Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.app
          dist/*.dmg
          MAGI-Pipeline.pkg
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}